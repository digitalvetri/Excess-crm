name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: excess_crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/excess_crm_test
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: test-session-secret-at-least-32-chars-long
      COOKIE_DOMAIN: localhost
      LOG_LEVEL: error

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push DB schema
        run: pnpm db:push
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/excess_crm_test

      - name: Apply RLS policies
        run: psql postgres://postgres:postgres@localhost:5432/excess_crm_test -f packages/db/prisma/rls-policies.sql

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgres://crm_app:change-in-production@localhost:5432/excess_crm_test

  e2e-live:
    name: Live E2E (per-role)
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: excess_crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/excess_crm
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-e2e-session-secret-at-least-32-chars-long
      COOKIE_DOMAIN: localhost
      INTERNAL_API_URL: http://localhost:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      LOG_LEVEL: error
      E2E_LIVE: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push DB schema
        run: pnpm db:push

      - name: Seed demo data
        run: pnpm --filter @excess/db run seed:demo

      - name: Install Playwright (chromium)
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Build web
        run: pnpm --filter web build

      - name: Start API + web
        run: |
          nohup pnpm --filter @excess/api exec tsx src/server.ts > /tmp/api.log 2>&1 &
          nohup pnpm --filter web exec next start -p 3000 > /tmp/web.log 2>&1 &
          echo "Waiting for API (:8000) and web (:3000)…"
          for i in $(seq 1 60); do
            api=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health || echo 000)
            web=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/login || echo 000)
            if [ "$api" != "000" ] && [ "$web" = "200" ]; then echo "Ready: API=$api WEB=$web"; break; fi
            sleep 3
          done
          curl -sf -o /dev/null http://localhost:3000/login || { echo "web not ready"; echo '--- api ---'; tail -40 /tmp/api.log; echo '--- web ---'; tail -40 /tmp/web.log; exit 1; }

      - name: Run live E2E suites
        working-directory: apps/web
        run: |
          pnpm exec playwright test \
            e2e/franchise-live.spec.ts \
            e2e/employee-live.spec.ts \
            e2e/employee-sales-flows.spec.ts \
            e2e/employee-delivery-flows.spec.ts \
            e2e/employee-marketing-analytics-flows.spec.ts \
            e2e/employee-responsive.spec.ts \
            e2e/admin-live.spec.ts \
            e2e/admin-flows.spec.ts \
            e2e/admin-responsive.spec.ts \
            e2e/engineer-live.spec.ts \
            e2e/engineer-flows.spec.ts \
            --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.excessindia.online
          cache-from: type=gha
          cache-to: type=gha,mode=max
