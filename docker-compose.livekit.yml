services:
  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    command: --config /etc/livekit/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-60000:50000-60000/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    networks:
      - excess-crm_default

  livekit-egress:
    image: livekit/egress:latest
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "
        envsubst < /etc/egress/egress.yaml > /tmp/egress.yaml &&
        /egress --config /tmp/egress.yaml
      "
    volumes:
      - ./livekit/egress.yaml:/etc/egress/egress.yaml:ro
    environment:
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    depends_on:
      - livekit
    networks:
      - excess-crm_default

  livekit-sip:
    image: livekit/sip:latest
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "
        envsubst < /etc/sip/sip.yaml > /tmp/sip.yaml &&
        /sip --config /tmp/sip.yaml
      "
    ports:
      - "5060:5060/udp"
      - "10000-20000:10000-20000/udp"
    volumes:
      - ./livekit/sip.yaml:/etc/sip/sip.yaml:ro
    environment:
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    depends_on:
      - livekit
    networks:
      - excess-crm_default

  agent:
    build:
      context: ./apps/agent
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      LIVEKIT_URL: "ws://livekit:7880"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      SARVAM_API_KEY: "${SARVAM_API_KEY}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY}"
      CRM_API_URL: "${CRM_API_URL}"
      AGENT_WEBHOOK_SECRET: "${AGENT_WEBHOOK_SECRET}"
    depends_on:
      - livekit
    networks:
      - excess-crm_default

networks:
  # This network is created by the main stack (docker-compose.prod.yml).
  # Verify the exact name on the VPS with: docker network ls | grep excess
  # Coolify may prefix it differently (e.g. excess-crm_default or a short hash).
  excess-crm_default:
    external: true
