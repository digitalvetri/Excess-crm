services:
  # NOTE: There is intentionally NO postgres/redis service here. The database and
  # Redis must be SINGLE shared resources (one Coolify-managed Postgres + one
  # Redis), referenced via DATABASE_URL / REDIS_URL in .env. Bundling a database
  # inside this stack caused each deployment/replica to get its OWN database,
  # which split sessions and data across backends (random logouts, vanishing
  # leads). Keeping the datastore external guarantees one source of truth no
  # matter how many app containers run.

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    env_file: .env
    expose:
      - '8000'
    networks:
      - default
      - coolify

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.excessindia.online
    restart: always
    env_file: .env
    expose:
      - '3000'
    environment:
      PORT: 3000
      HOSTNAME: '0.0.0.0'
      # Proxy target: web container reaches api container via Docker internal network.
      # Without this it falls back to http://localhost:8000 which doesn't exist in-container.
      INTERNAL_API_URL: http://api:8000
    networks:
      - default
      - coolify
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: always
    env_file: .env

networks:
  coolify:
    external: true
