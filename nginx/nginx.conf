events {
  worker_connections 1024;
}

http {
  client_max_body_size 20M;

  upstream web {
    server web:3000;
  }

  upstream api {
    server api:8000;
  }

  # Redirect all HTTP to HTTPS
  server {
    listen 80;
    server_name excessindia.online www.excessindia.online api.excessindia.online;

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # www redirect to root
  server {
    listen 443 ssl;
    server_name www.excessindia.online;

    ssl_certificate     /etc/letsencrypt/live/excessindia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/excessindia.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://excessindia.online$request_uri;
  }

  # Next.js web app at root domain
  server {
    listen 443 ssl;
    server_name excessindia.online;

    ssl_certificate     /etc/letsencrypt/live/excessindia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/excessindia.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://web;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # Fastify API
  server {
    listen 443 ssl;
    server_name api.excessindia.online;

    ssl_certificate     /etc/letsencrypt/live/api.excessindia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.excessindia.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
